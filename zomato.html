<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zomato</title>
</head>
<body>

<center>

    <h1>ZOMATO</h1>
    <h3>Discover the Best Food Near You</h3>

    <hr width="70%">
    <!-- MENU -->
    <h2> MENU</h2>

    <table border="1" cellpadding="10" cellspacing="0">

        <tr bgcolor="red">
            <th><font color="white">Item</font></th>
            <th><font color="white">Category</font></th>
            <th><font color="white">Price</font></th>
            <th><font color="white">Rating</font></th>
        </tr>

        <tr>
            <td> Pizza</td>
            <td>Italian</td>
            <td>₹500</td>
            <td>⭐⭐⭐⭐☆</td>
        </tr>

        <tr>
            <td> Burger</td>
            <td>Fast Food</td>
            <td>₹100</td>
            <td>⭐⭐⭐☆☆</td>
        </tr>

        <tr>
            <td> Coke</td>
            <td>Beverage</td>
            <td>₹50</td>
            <td>⭐⭐⭐⭐☆</td>
        </tr>

        <tr>
            <td>Caviar</td>
            <td>Luxury</td>
            <td>₹10000</td>
            <td>⭐⭐⭐⭐⭐</td>
        </tr>

    </table>

    <br><br>

    <!-- ORDER SECTION -->

    <h2> ORDER NOW</h2>

    <form>

        <label><b>Name</b></label><br>
        <input type="text" placeholder="Enter Name">

        <br><br>

        <label><b>Address</b></label><br>
        <textarea rows="4" cols="30"
        placeholder="Enter Delivery Address"></textarea>

        <br><br>

        <label><b>Select Item</b></label><br>

        <select>
            <option>Pizza</option>
            <option>Burger</option>
            <option>Coke</option>
            <option>Caviar</option>
        </select>

        <br><br>

        <label><b>Quantity</b></label><br>

        <input type="number" min="1" value="1">

        <br><br>

        <label><b>Payment Method</b></label><br>

        <input type="radio" name="pay"> UPI
        <input type="radio" name="pay"> Card
        <input type="radio" name="pay"> COD

        <br><br>

        <input type="submit" value="Place Order">

        <input type="reset" value="Clear">

    </form>

    <br>

    <hr width="70%">

    <p>
        📍 Fast Delivery | ⭐ Top Rated Restaurants |
        🛵 Free Delivery Above ₹499
    </p>

</center>

</body>
</html>
